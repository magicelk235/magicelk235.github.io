<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Page not found — Magic Elk Labs</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@500,700,800&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:dark;
  --canvas:#111413;--surface:#181c1b;--ink:#f4f4f2;--body:#cfcfd2;--mute:#94949c;
  --hair:rgba(244,244,242,.14);--brass:#c9a876;--brass-bright:#c9a876;--teal:#2fb3a5;
  --tint:rgba(201,168,118,.05)
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--canvas);color:var(--body);
  font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;text-align:center;
  background-image:radial-gradient(120% 100% at 50% 0%,var(--tint),transparent 70%);
}
.wrap{max-width:520px}
.code{
  font-family:"Cabinet Grotesk","Inter",sans-serif;font-weight:800;
  font-size:clamp(72px,16vw,132px);line-height:1;color:var(--ink);
  letter-spacing:-.03em;
}
.rule{width:44px;height:2px;background:var(--brass);margin:22px auto 24px;border-radius:2px}
h1{
  font-family:"Cabinet Grotesk","Inter",sans-serif;font-weight:700;
  font-size:clamp(22px,3.4vw,30px);color:var(--ink);letter-spacing:-.01em;margin-bottom:12px;
}
p{font-size:16px;line-height:1.6;color:var(--mute);margin-bottom:28px}
.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a.btn{
  display:inline-block;padding:11px 20px;border-radius:10px;
  font-size:15px;font-weight:600;text-decoration:none;transition:.15s;
}
a.primary{background:var(--brass);color:#fff}
a.primary:hover{background:var(--brass-bright)}
a.ghost{color:var(--ink);border:1px solid var(--hair)}
a.ghost:hover{border-color:var(--brass);color:var(--brass)}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <div class="rule"></div>
  <h1>This page took a wrong turn</h1>
  <p>The page you were after isn't here. It may have moved, or the link was wrong.</p>
  <div class="links">
    <a class="btn primary" href="/">Home</a>
  </div>
</div>
</body>
</html>
